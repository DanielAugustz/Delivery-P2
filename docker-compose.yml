services:
  postgres:
    image: postgres:16-alpine
    container_name: t2-postgres
    environment:
      POSTGRES_USER: t2delivery
      POSTGRES_PASSWORD: t2delivery
      POSTGRES_DB: t2delivery
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./services/order-service/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U t2delivery -d t2delivery"]
      interval: 5s
      timeout: 5s
      retries: 5

  catalog-service:
    build: ./services/catalog-service
    container_name: t2-catalog
    ports:
      - "5001:5001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  payment-service:
    build: ./services/payment-service
    container_name: t2-payment
    ports:
      - "5002:5002"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5002/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  order-service:
    build: ./services/order-service
    container_name: t2-order
    ports:
      - "5003:5003"
    environment:
      CATALOG_SERVICE_URL: http://catalog-service:5001
      PAYMENT_SERVICE_URL: http://payment-service:5002
      DATABASE_URL: postgresql://t2delivery:t2delivery@postgres:5432/t2delivery
    depends_on:
      postgres:
        condition: service_healthy
      catalog-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5003/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  api-gateway:
    build: ./services/api-gateway
    container_name: t2-gateway
    ports:
      - "5000:5000"
    environment:
      ORDER_SERVICE_URL: http://order-service:5003
    depends_on:
      order-service:
        condition: service_healthy

volumes:
  postgres_data:
