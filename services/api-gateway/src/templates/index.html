<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>T2 Delivery</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div class="page">
    <header><h1>Sistema de Pedidos</h1></header>
    <main>
      <section class="painel-pedido">
        <h2>Novo pedido</h2>
        <form id="form-pedido">
          <fieldset class="produtos">
            <legend>Adicionar produto</legend>
            <div class="linha-adicionar">
              <select id="select-produto" aria-label="Produto">
                <option value="" disabled selected>Selecione...</option>
                <option value="PIZZA">Pizza Grande — R$ 50,00</option>
                <option value="BURGER">Hambúrguer Artesanal — R$ 30,00</option>
              </select>
              <input type="number" id="qtd-produto" min="1" max="99" value="1" aria-label="Quantidade">
              <button type="button" id="btn-adicionar" class="btn-mais" title="Adicionar produto">+</button>
            </div>
          </fieldset>
          <pre id="preview-carrinho" class="preview-carrinho hidden"></pre>
          <label>Pagamento
            <select name="metodo_pagamento" required>
              <option value="" disabled selected>Selecione...</option>
              <option value="PIX">PIX (5% desconto)</option>
              <option value="CARTAO">Cartão</option>
            </select>
          </label>
          <button type="submit" id="btn-enviar">Fazer pedido</button>
        </form>
      </section>
    </main>
    <div id="resultado" class="resultado">
      <h3 class="log-titulo">Histórico de pedidos</h3>
      <p id="historico-vazio" class="vazio">Nenhum pedido ainda.</p>
      <div id="historico-pedidos"></div>
    </div>
  </div>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
