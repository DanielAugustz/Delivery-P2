# Render Blueprint — Sistema de Pedidos
# Deploy: Dashboard Render → New → Blueprint → conecte este repositório
#
# PostgreSQL: o plano free permite apenas 1 banco por conta.
# Não criamos banco aqui — configure DATABASE_URL manualmente no pedidos-order
# (Dashboard → pedidos-order → Environment → Internal Database URL do Postgres existente).
# Sem DATABASE_URL o order-service usa memória (pedidos não persistem entre restarts).

services:
  - type: web
    name: pedidos-catalog
    runtime: docker
    dockerfilePath: ./services/catalog-service/Dockerfile
    dockerContext: ./services/catalog-service
    plan: free
    healthCheckPath: /health

  - type: web
    name: pedidos-payment
    runtime: docker
    dockerfilePath: ./services/payment-service/Dockerfile
    dockerContext: ./services/payment-service
    plan: free
    healthCheckPath: /health

  - type: web
    name: pedidos-order
    runtime: docker
    dockerfilePath: ./services/order-service/Dockerfile
    dockerContext: ./services/order-service
    plan: free
    healthCheckPath: /health
    envVars:
      - key: CATALOG_SERVICE_URL
        fromService:
          name: pedidos-catalog
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: PAYMENT_SERVICE_URL
        fromService:
          name: pedidos-payment
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: DATABASE_URL
        sync: false

  - type: web
    name: sistema-pedidos
    runtime: docker
    dockerfilePath: ./services/api-gateway/Dockerfile
    dockerContext: ./services/api-gateway
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ORDER_SERVICE_URL
        fromService:
          name: pedidos-order
          type: web
          envVarKey: RENDER_EXTERNAL_URL
